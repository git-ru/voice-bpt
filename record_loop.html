<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>re:cord</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Karla:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.4s ease;
    display: flex;
    flex-direction: column;
  }
  .slide.active { opacity: 1; }

  /* SLIDE 1 — prompt card (cream) */
  #slide-text {
    background: #f0ede6;
    padding: 5vw 6vw;
    justify-content: space-between;
  }
  .card-eyebrow {
    font-family: 'Karla', sans-serif;
    font-size: clamp(0.6rem, 1.2vw, 0.85rem);
    letter-spacing: 0.25em;
    color: #9a9388;
    text-transform: uppercase;
  }
  .card-question {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: clamp(3rem, 8.5vw, 7.5rem);
    color: #1a1916;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.01em;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .card-rule {
    border: none;
    border-top: 1px solid #c8c4bc;
    margin: 2vw 0 1.5vw;
  }
  .card-footer {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: clamp(0.75rem, 1.4vw, 1rem);
    color: #6a6560;
    padding-bottom: 1vw;
  }

  /* SLIDE 2 — braille alphabet (white) */
  #slide-braille {
    background: #fff;
    padding: 4vw 5vw;
    justify-content: flex-start;
  }
  .braille-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5em;
  }
  .braille-eyebrow {
    font-family: 'Karla', sans-serif;
    font-size: clamp(0.55rem, 1vw, 0.75rem);
    letter-spacing: 0.15em;
    color: #888;
    text-transform: uppercase;
  }
  .braille-title {
    font-family: 'Karla', sans-serif;
    font-size: clamp(1.2rem, 3vw, 2.2rem);
    font-weight: 700;
    color: #1a1916;
    margin-bottom: 0.3em;
  }
  .braille-rule {
    border: none;
    border-top: 1px solid #ddd;
    margin-bottom: 2vw;
  }
  .braille-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2.5vw;
  }
  .braille-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5em;
  }
  .cell-letter {
    font-family: 'Karla', sans-serif;
    font-size: clamp(0.7rem, 1.5vw, 1.1rem);
    font-weight: 700;
    color: #1a1916;
  }
  .braille-dots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 3px;
    width: clamp(16px, 2.8vw, 32px);
    height: clamp(24px, 4.2vw, 48px);
  }
  .dot {
    border-radius: 50%;
    background: #d8d4cc;
    width: 100%;
    height: 100%;
  }
  .dot.raised {
    background: #1a1916;
  }
</style>
</head>
<body>

<!-- Slide 1 -->
<div class="slide active" id="slide-text">
  <div class="card-eyebrow">SOUNDTRACK FOR MY FUNERAL</div>
  <div class="card-question">how do you feel about what you cannot see?</div>
  <hr class="card-rule">
  <div class="card-footer">this becomes part of the installation</div>
</div>

<!-- Slide 2 -->
<div class="slide" id="slide-braille">
  <div class="braille-header">
    <span class="braille-eyebrow">OUR LAST SUPPER · SOUNDTRACK FOR MY FUNERAL</span>
    <span class="braille-eyebrow">Find each letter · punch the dots · spell your whole word</span>
  </div>
  <div class="braille-title">Braille Alphabet</div>
  <hr class="braille-rule">
  <div class="braille-row" id="braille-top"></div>
  <div class="braille-row" id="braille-bottom"></div>
</div>

<script>
const braille = {
  A:[1,0,0,0,0,0], B:[1,1,0,0,0,0], C:[1,0,0,1,0,0], D:[1,0,0,1,1,0],
  E:[1,0,0,0,1,0], F:[1,1,0,1,0,0], G:[1,1,0,1,1,0], H:[1,1,0,0,1,0],
  I:[0,1,0,1,0,0], J:[0,1,0,1,1,0], K:[1,0,1,0,0,0], L:[1,1,1,0,0,0],
  M:[1,0,1,1,0,0], N:[1,0,1,1,1,0], O:[1,0,1,0,1,0], P:[1,1,1,1,0,0],
  Q:[1,1,1,1,1,0], R:[1,1,1,0,1,0], S:[0,1,1,1,0,0], T:[0,1,1,1,1,0],
  U:[1,0,1,0,0,1], V:[1,1,1,0,0,1], W:[0,1,0,1,1,1], X:[1,0,1,1,0,1],
  Y:[1,0,1,1,1,1], Z:[1,0,1,0,1,1]
};

function makeCell(letter, dots) {
  const cell = document.createElement('div');
  cell.className = 'braille-cell';
  const lbl = document.createElement('span');
  lbl.className = 'cell-letter';
  lbl.textContent = letter;
  const grid = document.createElement('div');
  grid.className = 'braille-dots';
  dots.forEach(r => {
    const d = document.createElement('div');
    d.className = 'dot' + (r ? ' raised' : '');
    grid.appendChild(d);
  });
  cell.appendChild(lbl);
  cell.appendChild(grid);
  return cell;
}

const letters = Object.keys(braille);
letters.slice(0,13).forEach(l => document.getElementById('braille-top').appendChild(makeCell(l, braille[l])));
letters.slice(13).forEach(l => document.getElementById('braille-bottom').appendChild(makeCell(l, braille[l])));

const slides = document.querySelectorAll('.slide');
let current = 0;
setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 4000);
</script>
</body>
</html>
