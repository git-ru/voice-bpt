<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>re:cord — soundtrack for my funeral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f3ef;
      --text: #1a1916;
      --muted: #9a9388;
      --accent: #7a6a52;
      --rule: #dedad4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); height: 100%; }
    body {
      color: var(--text);
      font-family: 'Karla', sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.75;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      max-width: 960px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 18px 32px 14px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .page-title {
      font-family: 'EB Garamond', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .page-title .colon { color: var(--accent); }
    .back-link {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '← '; }

    .film-wrap {
      flex: 1;
      position: relative;
      background: #111;
      overflow: hidden;
      min-height: 0;
    }
    .film-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .bottom-bar {
      flex-shrink: 0;
      border-top: 1px solid var(--rule);
      padding: 20px 40px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 32px;
    }

    .invitation-left {
      font-size: 16px;
      color: var(--text);
      line-height: 1.6;
      text-align: right;
    }

    .invitation-right {
      font-size: 16px;
      color: var(--text);
      line-height: 1.6;
      text-align: left;
    }

    /* Center mic zone */
    .mic-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .rec-status {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-height: 20px;
    }
    em {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1.05em;
    }

    .record-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .post-record {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .post-record.visible { display: flex; }

    .btn-row-center {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    audio { height: 32px; width: 200px; }
    .timer-display {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--muted);
      min-height: 16px;
    }
    .recording-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c0392b;
    }
    .recording-indicator.visible { display: flex; }
    .rec-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c0392b;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .btn-record {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 1.5px solid #9a9388;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-record:hover { border-color: var(--muted); transform: scale(1.04); }
    .btn-record.recording { border-color: rgba(192,57,43,0.4); }
    .btn-record .icon-mic {
      width: 18px; height: 18px;
      fill: none;
      stroke: var(--text);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .btn-record .icon-stop {
      width: 13px; height: 13px;
      background: #c0392b;
      border-radius: 2px;
      display: none;
    }
    .btn-record.recording .icon-mic { display: none; }
    .btn-record.recording .icon-stop { display: block; }

    .btn-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
    }


    .btn {
      font-family: 'Karla', sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 16px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { border-color: rgba(122,106,82,0.4); color: var(--accent); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .consent-label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      cursor: pointer;
      max-width: 200px;
    }
    .consent-label input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border: 1px solid var(--muted);
      background: transparent;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }
    .consent-label input:checked { border-color: var(--accent); background: var(--accent); }
    .consent-label input:checked::after {
      content: '';
      position: absolute;
      left: 2px; top: 0;
      width: 4px; height: 7px;
      border: 1.5px solid var(--bg);
      border-top: none; border-left: none;
      transform: rotate(40deg);
    }

    .status-msg { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .status-msg.success { color: #5a8a6a; }
    .status-msg.error   { color: #c0392b; }
    .progress-bar-wrap { display: none; width: 48px; height: 1px; background: var(--rule); align-self: center; }
    .progress-bar-wrap.visible { display: block; }
    .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

    @media (max-width: 600px) {
      html, body { overflow: auto; height: auto; }
      .film-wrap { height: 56vw; flex: none; }
      .bottom-bar { flex-direction: column; align-items: flex-start; gap: 20px; padding: 20px 24px; }
      .post-record { flex-direction: column; align-items: flex-start; }
      audio { width: 100%; }
      .consent-label { max-width: 100%; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <h1 class="page-title">re<span class="colon">:</span>cord</h1>
    <a class="back-link" href="/">share your voice</a>
  </header>

  <div class="film-wrap">
    <iframe
      src="https://player.vimeo.com/video/520577254?h=6b5d6b96f8&badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&muted=1&loop=1&controls=0"
      frameborder="0"
      allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      style="position:absolute;top:0;left:0;width:100%;height:100%;"
      title="re:cord">
    </iframe>
  </div>
  <script src="https://player.vimeo.com/api/player.js"></script>

  <div class="bottom-bar">

    <p class="invitation-left">Watch the film.<br>Describe what you see.</p>

    <div class="mic-center">
      <div class="rec-status">
        <div class="recording-indicator" id="recIndicator">
          <div class="rec-dot"></div> rec
        </div>
        <div class="timer-display" id="timer"></div>
      </div>
      <div class="record-controls" id="recordControls">
        <button class="btn-record" id="btnRecord" title="Start recording">
          <svg class="icon-mic" viewBox="0 0 24 24">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
          </svg>
          <div class="icon-stop"></div>
        </button>
        <span class="btn-label" id="btnLabel">tap to record</span>
      </div>

      <div class="post-record" id="postRecord">
        <audio id="audioPlayback" controls></audio>
        <div class="btn-row-center">
          <button class="btn" id="btnRetake">retake</button>
          <button class="btn primary" id="btnSubmit" disabled>submit</button>
        </div>
        <label class="consent-label">
          <input type="checkbox" id="consentCheck">
          <span>I consent to this recording being used as part of <em>Soundtrack for My Funeral</em>.</span>
        </label>
        <div class="progress-bar-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
        <span class="status-msg" id="statusMsg"></span>
      </div>
    </div>

    <p class="invitation-right">It can be observational, poetic, personal — or all three. However you choose to do this, your perspective is welcome.</p>

  </div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkeM2MytKbhp9P5xYqZ4nXO3csYgrze64GO-ww9aAP8y4u3UBlHrC4ORwCbQW2nE3C/exec';
  const btnRecord=document.getElementById('btnRecord'), btnLabel=document.getElementById('btnLabel'),
    timerEl=document.getElementById('timer'), recIndicator=document.getElementById('recIndicator'),
    recordControls=document.getElementById('recordControls'), postRecord=document.getElementById('postRecord'),
    audioPlayback=document.getElementById('audioPlayback'), btnRetake=document.getElementById('btnRetake'),
    btnSubmit=document.getElementById('btnSubmit'), consentCheck=document.getElementById('consentCheck'),
    progressWrap=document.getElementById('progressWrap'), progressBar=document.getElementById('progressBar'),
    statusMsg=document.getElementById('statusMsg');
  let mediaRecorder,audioChunks=[],audioBlob,timerInterval,seconds=0,stream;
  function getMime(){const t=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','audio/aac'];for(const m of t)if(MediaRecorder.isTypeSupported(m))return m;return '';}
  function fmt(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
  async function startRecording(){
    try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
    catch{statusMsg.textContent='Microphone access denied.';statusMsg.className='status-msg error';return;}
    const mime=getMime();
    mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    audioChunks=[];
    mediaRecorder.addEventListener('dataavailable',e=>{if(e.data.size>0)audioChunks.push(e.data);});
    mediaRecorder.addEventListener('stop',()=>{
      audioBlob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
      audioPlayback.src=URL.createObjectURL(audioBlob);
      recordControls.style.display='none';
      postRecord.classList.add('visible');
    });
    mediaRecorder.start();
    btnRecord.classList.add('recording');
    recIndicator.classList.add('visible');
    btnLabel.textContent='tap to stop';
    seconds=0;timerEl.textContent='0:00';
    timerInterval=setInterval(()=>{seconds++;timerEl.textContent=fmt(seconds);},1000);
  }
  function stopRecording(){
    if(mediaRecorder?.state!=='inactive')mediaRecorder.stop();
    stream?.getTracks().forEach(t=>t.stop());
    btnRecord.classList.remove('recording');
    recIndicator.classList.remove('visible');
    clearInterval(timerInterval);timerEl.textContent='';
  }
  btnRecord.addEventListener('click',()=>{
    if(!mediaRecorder||mediaRecorder.state==='inactive')startRecording();
    else if(mediaRecorder.state==='recording')stopRecording();
  });
  btnRetake.addEventListener('click',()=>{
    audioBlob=null;audioPlayback.src='';
    postRecord.classList.remove('visible');
    recordControls.style.display='';
    btnSubmit.disabled=true;consentCheck.checked=false;
    btnLabel.textContent='tap to record';timerEl.textContent='';
    statusMsg.textContent='';statusMsg.className='status-msg';
  });
  consentCheck.addEventListener('change',()=>{btnSubmit.disabled=!consentCheck.checked;});
  btnSubmit.addEventListener('click',async()=>{
    if(!audioBlob||!consentCheck.checked)return;
    btnSubmit.disabled=true;btnRetake.disabled=true;
    statusMsg.textContent='Uploading…';
    progressWrap.classList.add('visible');progressBar.style.width='20%';
    const ext=audioBlob.type.includes('ogg')?'ogg':audioBlob.type.includes('mp4')?'m4a':'webm';
    const filename=`DanceSolo_Visitor_${new Date().toISOString().slice(0,10)}_${Date.now()}.${ext}`;
    const reader=new FileReader();
    reader.readAsDataURL(audioBlob);
    reader.onloadend=async()=>{
      progressBar.style.width='50%';
      await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({filename,fileData:reader.result.split(',')[1],mimeType:audioBlob.type,artworkTitle:'DanceSolo',consent:true})});
      progressBar.style.width='100%';
      setTimeout(()=>progressWrap.classList.remove('visible'),600);
      statusMsg.textContent='Thank you. Your voice has been added.';
      statusMsg.className='status-msg success';
      btnSubmit.textContent='submitted';
    };
  });
</script>
</body>
</html>
